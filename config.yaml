processing:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  model_name: "qwen2.5:7b-instruct"

translation:
  model_name: "gpt-5-mini"

languages:
  en-vi:
    source: "English"
    target: "Vietnamese"
    source_code: "en"
    target_code: "vi"

data:
  root: "data"
  unprocessed_dir: "unprocessed"
  processed_dir: "processed"
  backtranslated_dir: "backtranslated"
  translation_dir: "translation"
  input_file: "en-vi/0.en"

presets:
  base:
    modules: []
  term_only:
    modules: [terminology]
  rag_and_term:
    modules: [terminology, rag]
